AWSTemplateFormatVersion: "2010-09-09"
Description: "Forecast-based AWS Budget with email notification"

Parameters:
  NotificationEmail:
    Type: String
    Description: "Email address to receive budget alerts"

Resources:
  MonthlyForecastBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: Monthly-Forecast-Budget
        BudgetLimit:
          Amount: 100
          Unit: USD
        TimeUnit: MONTHLY
        BudgetType: COST
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: FORECASTED
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref NotificationEmail