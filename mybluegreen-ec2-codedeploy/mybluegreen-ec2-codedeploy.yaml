AWSTemplateFormatVersion: "2010-09-09"
Description: "MyBlueGreen-EC2-CodeDeploy - Single-file CloudFormation example (EC2 + ALB + CodeDeploy Blue/Green)"

Parameters:
  NamePrefix:
    Type: String
    Default: mybg
    Description: Prefix for naming resources

  VpcId:
    Type: AWS::EC2::VPC::Id

  PublicSubnets:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets for the ALB (typically public)

  PrivateSubnets:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets for EC2 instances (typically private)

  InstanceType:
    Type: String
    Default: t3.micro

  LatestAmiId:
    Type: "AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>"
    Default: "/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64"

Resources:
  # ---------------------------
  # Networking / Security
  # ---------------------------
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${NamePrefix}-alb-sg"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${NamePrefix}-ec2-sg"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref AlbSecurityGroup

  # ---------------------------
  # Load Balancer (ALB)
  # ---------------------------
  AppLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${NamePrefix}-alb"
      Type: application
      Scheme: internet-facing
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets: !Ref PublicSubnets

  BlueTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${NamePrefix}-tg-blue"
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: 80
      TargetType: instance
      HealthCheckPath: /
      Matcher:
        HttpCode: "200-399"

  GreenTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${NamePrefix}-tg-green"
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: 80
      TargetType: instance
      HealthCheckPath: /
      Matcher:
        HttpCode: "200-399"

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref AppLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref BlueTargetGroup

  # ---------------------------
  # IAM for EC2 (SSM + CodeDeploy agent + logs)
  # ---------------------------
  Ec2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-ec2-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        # Optional, helpful for pulling bundles from S3 if you use S3 revisions:
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${NamePrefix}-ec2-profile"
      Roles:
        - !Ref Ec2Role

  # ---------------------------
  # Launch Template (installs a simple web + CodeDeploy agent)
  # ---------------------------
  AppLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "${NamePrefix}-lt"
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Name: !Ref Ec2InstanceProfile
        SecurityGroupIds:
          - !Ref Ec2SecurityGroup
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -e
            dnf -y update
            dnf -y install ruby wget
            # Simple web server content (this is your "blue" baseline)
            dnf -y install httpd
            systemctl enable httpd
            echo "BLUE baseline - $(hostname)" > /var/www/html/index.html
            systemctl start httpd

            # Install CodeDeploy agent
            cd /tmp
            wget https://aws-codedeploy-${AWS::Region}.s3.${AWS::Region}.amazonaws.com/latest/install
            chmod +x ./install
            ./install auto
            systemctl enable codedeploy-agent
            systemctl start codedeploy-agent

  # ---------------------------
  # Auto Scaling Group (EC2 fleet)
  # Attach ASG to BLUE TG initially via TargetGroupARNs.
  # CodeDeploy will create/attach GREEN during deployments.
  # ---------------------------
  AppAsg:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub "${NamePrefix}-asg"
      VPCZoneIdentifier: !Ref PrivateSubnets
      MinSize: "2"
      MaxSize: "4"
      DesiredCapacity: "2"
      LaunchTemplate:
        LaunchTemplateId: !Ref AppLaunchTemplate
        Version: !GetAtt AppLaunchTemplate.LatestVersionNumber
      TargetGroupARNs:
        - !Ref BlueTargetGroup
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-app"
          PropagateAtLaunch: true

  # ---------------------------
  # CodeDeploy (Blue/Green for EC2/ASG)
  # ---------------------------
  CodeDeployApplication:
    Type: AWS::CodeDeploy::Application
    Properties:
      ApplicationName: !Sub "${NamePrefix}-codedeploy-app"
      ComputePlatform: Server

  CodeDeployServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-codedeploy-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codedeploy.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # AWS managed policy for CodeDeploy deployments with ALB/ASG
        - arn:aws:iam::aws:policy/service-role/AWSCodeDeployRole

  CodeDeployDeploymentGroup:
    Type: AWS::CodeDeploy::DeploymentGroup
    Properties:
      ApplicationName: !Ref CodeDeployApplication
      DeploymentGroupName: !Sub "${NamePrefix}-dg"
      ServiceRoleArn: !GetAtt CodeDeployServiceRole.Arn

      AutoScalingGroups:
        - !Ref AppAsg

      DeploymentStyle:
        DeploymentType: BLUE_GREEN
        DeploymentOption: WITH_TRAFFIC_CONTROL

      LoadBalancerInfo:
        TargetGroupInfoList:
          - Name: !GetAtt BlueTargetGroup.TargetGroupName
          - Name: !GetAtt GreenTargetGroup.TargetGroupName

      BlueGreenDeploymentConfiguration:
        DeploymentReadyOption:
          # If traffic shift waits too long, continue anyway
          ActionOnTimeout: CONTINUE_DEPLOYMENT
        TerminateBlueInstancesOnDeploymentSuccess:
          Action: TERMINATE
          TerminationWaitTimeInMinutes: 5

      # Optional: Auto rollback on failure
      AutoRollbackConfiguration:
        Enabled: true
        Events:
          - DEPLOYMENT_FAILURE
          - DEPLOYMENT_STOP_ON_ALARM
          - DEPLOYMENT_STOP_ON_REQUEST

Outputs:
  AlbDnsName:
    Description: Public URL (ALB DNS)
    Value: !GetAtt AppLoadBalancer.DNSName

  CodeDeployAppName:
    Value: !Ref CodeDeployApplication

  CodeDeployDeploymentGroupName:
    Value: !Ref CodeDeployDeploymentGroup